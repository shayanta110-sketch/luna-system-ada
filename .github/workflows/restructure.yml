name: Restructure Repository

on:
  workflow_dispatch:

jobs:
  restructure:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Move folders and restructure
      run: |
        mkdir -p ada-nexus
        
        # جابه‌جایی پوشه‌های اصلی (فرض بر این است که هر کدام از قبل زیرپوشه همنام خود را دارند)
        mv nexus-router nexus-vision nexus-translate nexus-memory ada-nexus/
        
        # جابه‌جایی ada-tools (اگر وجود دارد)
        if [ -d "ada-tools" ]; then
          mv ada-tools ada-nexus/
        fi
        
        # در صورت نیاز، می‌توانید زیرپوشه‌ها را خودتان بسازید و فایل‌ها را جابه‌جا کنید
        # اما اگر ساختار فعلی شما تخت است، باید دستورات زیر را اجرا کنید:
        
        # مثال: اگر داخل nexus-router فایل‌های تخت دارید و می‌خواهید زیرپوشه nexus_router بسازید:
        # mkdir -p ada-nexus/nexus-router/nexus_router
        # mv ada-nexus/nexus-router/*.py ada-nexus/nexus-router/nexus_router/ 2>/dev/null || true
        
    - name: Commit and push changes
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add .
        git commit -m "chore: restructure project into ada-nexus monorepo" || echo "No changes to commit"
        git push
