name: Run Autonomous Agent

on:
  issues:
    types: [labeled]   # وقتی برچسبی به Issue اضافه می‌شود

jobs:
  run-ai:
    # فقط اگر برچسب با 'ai-' شروع شود
    if: startsWith(github.event.label.name, 'ai-')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # همچنین می‌توان مستقیماً نصب کرد:
          # pip install openai google-generativeai

      - name: Debug info (optional)
        run: |
          echo "AI_TYPE: ${{ github.event.label.name }}"
          echo "Issue title: ${{ github.event.issue.title }}"
          echo "Issue body length: ${{ github.event.issue.body }}"

      - name: Run Autonomous Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          AI_TYPE: ${{ github.event.label.name }}
        run: |
          python .github/scripts/main_agent.py
        # توجه: مسیر main_agent.py را مطابق با جایی که فایل را قرار داده‌اید تنظیم کنید
        # اگر در root است: python main_agent.py

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "🤖 AI update by ${{ github.event.label.name }}"
          title: "AI Update: ${{ github.event.issue.title }}"
          body: |
            این Pull Request به صورت خودکار توسط عامل هوش مصنوعی بر اساس Issue #${{ github.event.issue.number }} تولید شده است.
            
            برچسب: `${{ github.event.label.name }}`
            
            لطفاً تغییرات را بررسی کنید.
          branch: "ai-update-${{ github.run_id }}"
          base: main   # یا هر شاخه پایه دیگر
          delete-branch: true
