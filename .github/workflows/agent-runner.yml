name: Run Autonomous Agent

on:
  workflow_dispatch:

jobs:
  run-ai:
    runs-on: ubuntu-latest
    
    # اجازه دسترسی برای ساخت فایل و آپدیت کردن مخزن
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Modern Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-genai

      - name: Run main agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python .github/scripts/main_agent.py

      - name: Commit and Push changes
        if: success()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          # بررسی وجود تغییرات قبل از کامیت برای جلوگیری از خطا
          git diff --quiet && git diff --staged --quiet || git commit -m "AI generated files"
          git push
